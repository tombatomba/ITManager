{% extends "base.html" %}

{% block title %}Categories{% endblock %}

{% block content %}
    <title>Absence Calendar</title>

    <!-- FullCalendar CSS -->
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.4/main.min.css" rel="stylesheet">

    <!-- Bootstrap CSS -->
    <!--link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"-->

    <style>
 
        #calendar {
            background: white;
            padding: 10px;
            border-radius: 10px;
            margin-top: 10px;
        }
    </style>


<div class="container py-4">

    <div class="d-flex align-items-center gap-2">
        <h3>Employees Absence Calendar</h3>
        <a href="{{ url_for('web.absence_matrix') }}" class="btn btn-secondary">Week view</a>
    </div>

   
   

    <div id="calendar"></div>
        
    <!-- Modal for adding absence -->
    <div class="modal fade" id="absenceModal" tabindex="-1">
        <div class="modal-dialog">
            <form class="modal-content" method="POST" action="{{ url_for('web.add_absence') }}">
                <div class="modal-header">
                    <h5 class="modal-title">Add Absence</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">

                    <div class="mb-3">
                        <label class="form-label">Selected Date</label>
                        <input type="text" id="absenceDate" name="startDate" class="form-control" readonly>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">End Date</label>
                        <input type="date" id="lastDate" name="lastDate" class="form-control" >
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Employee</label>
                        <select class="form-select" id="employeeSelect" name="employeeSelect">
                            <option value="" selected disabled>Choose employee...</option>
                            {% for member in team_members %}
                                <option value="{{ member.ID }}">{{ member.Name }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Absence Type</label>
                        <select class="form-select" id="typeSelect" name="typeSelect">
                            <option value="holiday">Holiday</option>
                            <option value="freeDay">Free Day</option>
                            <option value="homeOffice">Home Office</option>
                        </select>
                    </div>

                </div>

                <div class="modal-footer">
                    <button type="submit" class="btn btn-primary">Save</button>
                </div>
            </form>
        </div>
    </div>

    <!-- JS -->
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.4/index.global.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
    document.addEventListener("DOMContentLoaded", function () {
    const calendarEl = document.getElementById("calendar");

    const calendar = new FullCalendar.Calendar(calendarEl, {
        initialView: "dayGridMonth",
        selectable: true,
        // Omogućava interakciju i premeštanje/promenu veličine
        editable: true, 
        // Prikaz manjeg info pop-up-a kada se zadrži miš
        eventDidMount: function(info) {
             // Može se dodati tooltip ovde
        },
        
        events: {{ events|tojson }},
        
        // ------------------------------------------------------------------
        // KLIK NA DATUM (DODAVANJE)
        // ------------------------------------------------------------------
        dateClick: function(info) {
            document.getElementById("absenceDate").value = info.dateStr;
            document.getElementById("lastDate").value = info.dateStr; 
            // Opciono: Postavite ID zaposlenog u skriveno polje ako je moguće
            let modal = new bootstrap.Modal(document.getElementById("absenceModal"));
            modal.show();
        },

        // ------------------------------------------------------------------
        // KLIK NA DOGAĐAJ (BRISANJE)
        // ------------------------------------------------------------------
        eventClick: function(info) {
            const event = info.event;
            
            // Provera da li događaj ima ID
            if (!event.id) {
                 alert("Greška: Događaj nema ID i ne može biti obrisan.");
                 return;
            }

            if (confirm(`Do you want to delete this event "${event.title}"?`)) {
                
                // 1. Vizuelno uklanjanje
                event.remove(); 
                
                // 2. Trajno brisanje na serveru
                deleteAbsenceOnServer(event.id);
            }
        },

        // ------------------------------------------------------------------
        // OPCIONO: PODEŠAVANJE DATUMA (Premeštanje/Event Drop)
        // ------------------------------------------------------------------
        eventDrop: function(info) {
            // Poziva se nakon što se događaj premesti na drugi datum
            updateAbsenceOnServer(info.event.id, info.event.startStr, info.event.endStr);
        },

        // ------------------------------------------------------------------
        // OPCIONO: PODEŠAVANJE DATUMA (Promena veličine/Event Resize)
        // ------------------------------------------------------------------
        eventResize: function(info) {
            // Poziva se nakon što se promeni dužina događaja
            updateAbsenceOnServer(info.event.id, info.event.startStr, info.event.endStr);
        }
        
    });

    calendar.render();
});


// ------------------------------------------------------------------
// FUNKCIJE ZA KOMUNIKACIJU SA SERVEROM (Flask)
// ------------------------------------------------------------------

/**
 * Šalje POST zahtev Flask ruti za trajno brisanje odsustva.
 * @param {string | number} absenceId - Jedinstveni ID odsustva.
 */
function deleteAbsenceOnServer(absenceId) {
    // Proveravamo ID
    if (!absenceId) {
        console.error("Delete without ID-a.");
        return;
    }
    
    // Koristimo fetch API za slanje zahteva
    fetch(`/delete-absence/${absenceId}`, {
        method: 'POST', 
        headers: {
            'Content-Type': 'application/json',
        }
    })
    .then(response => {
        if (!response.ok) {
            // Greška na serveru: Vraćanje događaja u kalendar
            const calendar = FullCalendar.getCalendarById('calendar'); // Ako ste definisali ID
            // Opciono: Ponovo učitavanje celog kalendara ili ponovno dodavanje događaja
            alert('Greška pri brisanju odsustva. Proverite server.');
            console.error('Server error:', response);
        } else {
            console.log(`Odsustvo ID ${absenceId} je uspešno obrisano.`);
        }
    })
    .catch(error => {
        console.error('Mrežna greška:', error);
        alert('Mrežna greška. Neuspešno brisanje.');
    });
}

/**
 * Šalje POST zahtev Flask ruti za ažuriranje datuma odsustva (eventDrop/eventResize).
 * @param {string | number} absenceId - Jedinstveni ID odsustva.
 * @param {string} newStart - Novi datum početka (ISO format).
 * @param {string} newEnd - Novi datum kraja (ISO format).
 */
function updateAbsenceOnServer(absenceId, newStart, newEnd) {
    fetch('/update-absence', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
        },
        body: JSON.stringify({
            id: absenceId,
            start: newStart,
            end: newEnd
        })
    })
    .then(response => {
        if (!response.ok) {
            // Greška: Resetovanje pozicije događaja u kalendaru
            alert('Greška pri ažuriranju odsustva. Proverite server.');
            info.revert(); // Poništavanje promene
        } else {
            console.log(`Odsustvo ID ${absenceId} je ažurirano.`);
        }
    })
    .catch(error => {
        console.error('Mrežna greška:', error);
        //alert('Mrežna greška. Neuspešno ažuriranje.');
        info.revert(); // Poništavanje promene
    });
}
    </script>

</div>

{% endblock %}
