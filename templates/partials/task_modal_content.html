<div class="modal fade" id="aiTaskModal" tabindex="-1" aria-labelledby="aiTaskModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg shadow-lg">
        <div class="modal-content border-primary">
            <div class="modal-header bg-light border-bottom">
                <h5 class="modal-title" id="aiTaskModalLabel">
                    <i class="fas fa-robot text-primary me-2"></i> ELPatron Smart Task Suggestions
                </h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>

            <div class="modal-body p-4">
                <ul class="nav nav-pills mb-4 bg-light p-2 rounded" id="taskTab" role="tablist">
                    {% for task in suggestions %}
                    <li class="nav-item flex-fill" role="presentation">
                        <button class="nav-link w-100 {% if loop.first %}active{% endif %}" 
                                id="tab-btn-{{ loop.index }}" 
                                data-bs-toggle="tab" 
                                data-bs-target="#content-{{ loop.index }}" 
                                type="button" role="tab">
                            <i class="fas fa-tasks me-1"></i> Suggestion {{ loop.index }}
                        </button>
                    </li>
                    {% endfor %}
                </ul>

                <div class="tab-content" id="taskTabContent">
                    {% for task in suggestions %}
                    <div class="tab-pane fade {% if loop.first %}show active{% endif %}" 
                         id="content-{{ loop.index }}" role="tabpanel">
                        
                        <form id="aiTaskForm_{{ loop.index }}" class="p-2">
                            <div class="mb-3">
                                <label class="fw-bold text-dark small mb-1">TASK NAME</label>
                                <input type="text" name="Name" class="form-control border-primary-subtle" 
                                       value="{{ task.Name }}" placeholder="Enter task title...">
                            </div>

                            <div class="mb-3">
                                <label class="fw-bold text-dark small mb-1">DESCRIPTION</label>
                                <textarea name="Description" class="form-control border-primary-subtle" 
                                          rows="3" placeholder="What needs to be done?">{{ task.Description }}</textarea>
                            </div>

                            <div class="mb-3">
                                <label class="fw-bold text-dark small mb-1">CATEGORY</label>
                                <select name="TaskCategoryID" class="form-select border-primary-subtle">
                                    <option value="">-- Select Category --</option>
                                    {% for cat in categories %}
                                        <option value="{{ cat.ID }}" 
                                            {% if cat.ID == task.TaskCategoryID %} selected {% endif %}>
                                            {{ cat.Name }}
                                        </option>
                                    {% endfor %}
                                </select>
                            </div>

                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label class="fw-bold text-dark small mb-1">ACTIVATION DATE</label>
                                    <input type="date" name="ActivationDate" class="form-control border-primary-subtle" 
                                           value="{{ task.ActivationDate }}">
                                </div>
                                <div class="col-md-6">
                                    <label class="fw-bold text-dark small mb-1">END DATE (DEADLINE)</label>
                                    <input type="date" name="EndDate" class="form-control border-primary-subtle" 
                                           value="{{ task.EndDate }}">
                                </div>
                            </div>

                            <input type="hidden" name="TeamID" value="{{ team_id }}">
                            
                            <div class="mt-4 text-end">
                                <button type="button" id="save-btn-{{ loop.index }}" 
                                        onclick="saveAITask({{ loop.index }})" 
                                        class="btn btn-outline-primary px-4 shadow-sm">
                                    <i class="fas fa-cloud-upload-alt me-2"></i> Save Suggestion {{ loop.index }}
                                </button>
                            </div>
                        </form>
                    </div>
                    {% endfor %}
                </div>
            </div>

            <div class="modal-footer bg-light border-top d-flex justify-content-between">
                <div class="text-muted small">
                    <i class="fas fa-lightbulb text-warning me-1"></i> 
                    You can refine and save multiple suggestions.
                </div>
                <div>
                    <button type="button" class="btn btn-secondary me-2" data-bs-dismiss="modal">Discard All</button>
                    <button type="button" class="btn btn-primary px-4" onclick="window.location.reload()">
                        <i class="fas fa-check-circle me-2"></i> Done & Refresh 
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    /* Stilovi za "SAVED" status */
    .task-saved {
        background-color: #f8f9fa !important;
        opacity: 0.7;
        pointer-events: none; /* Onemogućava dalju izmenu nakon čuvanja */
    }
    
    .nav-link.text-success-custom {
        color: #198754 !important;
        border-bottom: 3px solid #198754 !important;
    }

    .form-control:focus, .form-select:focus {
        border-color: #0d6efd;
        box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.1);
    }
</style>
