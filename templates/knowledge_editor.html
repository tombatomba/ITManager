{% extends "base.html" %}

{% block content %}
<link rel="stylesheet" href="https://unpkg.com/easymde/dist/easymde.min.css">
<script src="https://unpkg.com/easymde/dist/easymde.min.js"></script>

<style>
    .editor-container { background: white; padding: 20px; border-radius: 8px; }
    /* Prilagođavanje visine editora */
    .CodeMirror { min-height: 400px; }
    .bg-team { background-color: #198754; } /* Bootstrap Success */
    .bg-company { background-color: #0d6efd; } /* Bootstrap Primary */
</style>

<div class="container mt-4 mb-5">
    <nav aria-label="breadcrumb">
        <ol class="breadcrumb">
           
            <li class="breadcrumb-item active" aria-current="page">New {{ scope|capitalize }} Article</li>
        </ol>
    </nav>

    <div class="card shadow border-0">
        <div class="card-header text-white {{ 'bg-company' if scope == 'company' else 'bg-team' }}">
            <h4 class="mb-0"><i class="bi bi-pencil-square"></i> Create {{ scope|capitalize }} Knowledge</h4>
        </div>
        <div class="card-body editor-container">
            <form action="{{ url_for('web.save_knowledge') }}" method="POST">
                <input type="hidden" name="scope" value="{{ scope }}">
                {% if doc %}<input type="hidden" name="doc_id" value="{{ doc.ID }}">{% endif %}

                <div class="row">
                    <div class="col-md-8 mb-3">
                        <label class="form-label fw-bold">Document Title</label>
                        <input type="text" name="FileName" class="form-control form-control-lg" 
                            value="{{ doc.FileName if doc else '' }}" required>
                    </div>
                    <div class="col-md-4 mb-3">
                        <label class="form-label fw-bold">Scope</label>
                        <input type="text" class="form-control" value="{{ scope|upper }}" readonly>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">Short Description</label>
                    <textarea name="Description" class="form-control" rows="2">{{ doc.Description if doc else '' }}</textarea>
                </div>

                <div class="mb-4">
                    <label class="form-label fw-bold">Content (Markdown Format)</label>
                    <textarea id="markdown-editor" name="FileContent">{{ doc.FileContent if doc else '' }}</textarea>
                </div>

                <div class="d-flex justify-content-between border-top pt-3">
                    <a href="javascript:history.back()" class="btn btn-outline-secondary px-4">Cancel</a>
                    <button type="submit" class="btn btn-success btn-lg px-5 shadow-sm">
                        <i class="bi bi-cloud-arrow-up"></i> Save 
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>



<script>
    // Inicijalizacija EasyMDE editora
    const easyMDE = new EasyMDE({
        element: document.getElementById('markdown-editor'),
        spellChecker: false,
        placeholder: "Write your documentation here...",
        renderingConfig: {
            singleLineBreaks: false,
            codeSyntaxHighlighting: true,
        },
        toolbar: [
            "bold", "italic", "heading", "|", 
            "quote", "unordered-list", "ordered-list", "|", 
            "link", "image", "table", "|", 
            "preview", "side-by-side", "fullscreen", "|", 
            "guide"
        ]
    });
</script>
{% endblock %}
