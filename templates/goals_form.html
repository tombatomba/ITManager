{% extends "base.html" %}

{% block title %}Users{% endblock %}

{% block content %}

<div class="container mt-4">
    <h2 class="mb-4">
        {% if action == 'add' %}
            Add New Goal for {{ employee_name }} ({{ employee_id }})
        {% else %}
            Edit Goal for {{ employee_name }} ({{ employee_id }})
        {% endif %}
    </h2>
    
    <form method="POST">
        <div class="mb-3">
            <label for="employee_id" class="form-label">Employee ID</label>
            <input type="text" 
                   id="employee_id" 
                   name="employee_id" 
                   class="form-control" 
                   value="{{ employee_id }}" 
                   readonly>
        </div>
    
        <div class="mb-3">
            <label for="employee_name" class="form-label">Employee Name</label>
            <input type="text" 
                   id="employee_name" 
                   name="employee_name" 
                   class="form-control" 
                   value="{{ employee_name }}" 
                   readonly>
        </div>
    
        <div class="mb-3">
            <label for="goal_type" class="form-label">Goal Type (Quarter)</label>
            <select id="goal_type" 
                    name="goal_type" 
                    class="form-select" 
                    required>
                <option value="">-- Select Quarter --</option>
                <option value="Q1" {% if goal and goal.GoalType == 'Q1' %}selected{% endif %}>Q1</option>
                <option value="Q2" {% if goal and goal.GoalType == 'Q2' %}selected{% endif %}>Q2</option>
                <option value="Q3" {% if goal and goal.GoalType == 'Q3' %}selected{% endif %}>Q3</option>
                <option value="Q4" {% if goal and goal.GoalType == 'Q4' %}selected{% endif %}>Q4</option>
            </select>
        </div>
        <div class="mb-3">
            <label for="goal_year" class="form-label">Year</label>
            <select id="goal_year" 
                    name="goal_year" 
                    class="form-select" 
                    required>                    
                    <option value="">-- Select year --</option>
                    <option value="2025" {% if goal and goal.Year|string == '2025' %}selected{% endif %}>2025</option>
                    <option value="2026" {% if goal and goal.Year|string == '2026' %}selected{% endif %}>2026</option>
                    <option value="2027" {% if goal and goal.Year|string == '2027' %}selected{% endif %}>2027</option>                             
            </select>
        </div>
    
        <div class="mb-3">
            <label for="goal_description" class="form-label">Goal Description</label>
            <textarea id="goal_description" 
                      name="goal_description" 
                      class="form-control" 
                      rows="5" 
                      required>{% if goal %}{{ goal.Description }}{% endif %}</textarea>
        </div>
    
        <button type="submit" class="btn btn-primary">
            {% if action == 'add' %}Add Goal{% else %}Save Changes{% endif %}
        </button>
        <a href="{{ url_for('web.employee_goals', employee_id=employee_id) }}" class="btn btn-secondary">Cancel</a>
    </form>

  

</div>

{% endblock %}
