{% extends "base.html" %}

{% block title %}Notes{% endblock %}

{% block content %}

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<div class="container-fluid">
    <div class="row">

        <div class="col-md-3 border-end p-3" style="background-color: #f8f9fa; height: 100vh;">
            
            <button class="btn btn-primary w-100 mb-3" id="add-note">+ New Note</button>

            <div class="row g-2 mb-3">
                <div class="col-6">
                    <select id="filter-month" class="form-select form-select-sm">
                        <option value="ALL">All months</option>
                        <option value="01">January</option>
                        <option value="02">February</option>
                        <option value="03">March</option>
                        <option value="04">April</option>
                        <option value="05">May</option>
                        <option value="06">June</option>
                        <option value="07">July</option>
                        <option value="08">August</option>
                        <option value="09">September</option>
                        <option value="10">October</option>
                        <option value="11">November</option>
                        <option value="12">December</option>
                    </select>
                </div>
                <div class="col-6">
                    <select id="filter-year" class="form-select form-select-sm">
                        <option value="ALL">All years</option>
                        <option value="2024">2024</option>
                        <option value="2025">2025</option>
                        <option value="2026">2026</option>
                        <option value="2027">2027</option>
                        <option value="2028">2028</option>
                    </select>
                </div>
            </div>

            <div style="overflow-y: auto; height: calc(100vh - 200px);">
                <ul class="list-group" id="notes-list">
                    {% for note in notes %}
                        <li class="list-group-item note-item"                        
                            data-date="{{ note.NoteDate }}" 
                            data-id="{{ note.ID }}"
                            data-title="{{ note.NoteTitle }}" 
                            data-content="{{ note.NoteContent|e }}" 
                            style="cursor: pointer;">
                            <small class="text-muted d-block">{{ note.NoteDate }}</small>
                            <strong>{{ note.NoteTitle if note.NoteTitle else 'No title' }}</strong>
                            <p style="display:none;">{{ note.NoteContent|e }}</p>
                        </li>
                    {% endfor %}
                </ul>
            </div>
        </div>

        <div class="col-md-9 p-3">
            <form method="POST" action="{{ url_for('web.save_note') }}">
                <input type="hidden" name="note_id" id="note-id" value="">
                <div class="row mb-2">
                    <div class="col-md-4">
                        <input type="date" name="date" id="note-date" class="form-control" value="{{ today }}">
                    </div>
                    <div class="col-md-8">
                        <input type="text" name="title" id="note-title" class="form-control" placeholder="Title">
                    </div>
                </div>
                <textarea name="content" id="note-content" class="form-control mb-2" placeholder="Enter your note text..." style="height:70vh;"></textarea>
                <button type="submit" class="btn btn-success float-end">Save</button>
            </form>
        </div>
    </div>
</div>

<script>
const notesList = document.getElementById("notes-list");
const noteItems = document.querySelectorAll(".note-item");
const filterMonth = document.getElementById("filter-month");
const filterYear = document.getElementById("filter-year");

const noteId = document.getElementById("note-id");
const noteDate = document.getElementById("note-date");
const noteTitle = document.getElementById("note-title");
const noteContent = document.getElementById("note-content");
const addNoteBtn = document.getElementById("add-note");

// --- LOGIKA ZA FILTRIRANJE ---
function applyFilters() {
    const selectedMonth = filterMonth.value;
    const selectedYear = filterYear.value;

    noteItems.forEach(item => {
        const dateStr = item.dataset.date; // Format "YYYY-MM-DD"
        const [year, month, day] = dateStr.split("-");

        const monthMatch = (selectedMonth === "ALL" || selectedMonth === month);
        const yearMatch = (selectedYear === "ALL" || selectedYear === year);

        item.style.display = (monthMatch && yearMatch) ? "block" : "none";
    });
}

filterMonth.addEventListener("change", applyFilters);
filterYear.addEventListener("change", applyFilters);

// --- SELEKTOVANJE ---
noteItems.forEach(li => {
    li.addEventListener("click", () => {
        // Vizuelni feedback za selekciju
        noteItems.forEach(i => i.classList.remove("active"));
        li.classList.add("active");

        noteId.value = li.dataset.id;
        noteDate.value = li.dataset.date;
        noteTitle.value = li.dataset.title;
        noteContent.value = li.dataset.content;
    });
});

// --- NOVA BELEŠKA ---
addNoteBtn.addEventListener("click", () => {
    noteItems.forEach(i => i.classList.remove("active"));
    const todayStr = new Date().toISOString().slice(0,10);
    
    noteId.value = "";
    noteDate.value = todayStr;
    noteTitle.value = "Nova beleška";
    noteContent.value = "";
    noteTitle.focus();
});
</script>

<style>
    .note-item.active {
        background-color: #0d6efd !important;
        color: white !important;
    }
    .note-item.active .text-muted {
        color: #e0e0e0 !important;
    }
</style>

{% endblock %}
