<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

{% block title %}Change Password{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="text-center mb-4">
                <div class="icon-box bg-warning-subtle text-warning rounded-circle mx-auto mb-3">
                    <i class="fa-solid fa-key fa-2x"></i>
                </div>
                <h2 class="fw-bold">Secure Your Account</h2>
                <p class="text-muted">You are using a temporary password. Please set a new one to continue.</p>
            </div>

            <div class="card shadow border-0 p-4" style="border-radius: 15px;">
                <form action="{{ url_for('web.change_password') }}" method="POST" id="passwordForm">
                    
                    <div class="mb-3">
                        <label for="new_password" class="form-label small fw-bold">NEW PASSWORD</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0"><i class="fa-solid fa-lock text-muted"></i></span>
                            <input type="password" name="new_password" id="new_password" 
                                   class="form-control border-start-0" placeholder="Min. 8 characters" required>
                            <button class="btn btn-outline-secondary border-start-0" type="button" onclick="togglePwd('new_password')">
                                <i class="fa-solid fa-eye" id="eye-new_password"></i>
                            </button>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label for="confirm_password" class="form-label small fw-bold">CONFIRM PASSWORD</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0"><i class="fa-solid fa-check-double text-muted"></i></span>
                            <input type="password" name="confirm_password" id="confirm_password" 
                                   class="form-control border-start-0" placeholder="Repeat new password" required>
                        </div>
                        <div id="passwordHelp" class="form-text text-danger d-none">
                            Passwords do not match!
                        </div>
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary py-2 fw-bold" id="submitBtn">
                            Update Password <i class="fa-solid fa-arrow-right ms-2"></i>
                        </button>
                    </div>
                </form>
            </div>

            <div class="mt-4 p-3 bg-light rounded text-center small text-muted">
                <i class="fa-solid fa-shield-halved me-1"></i> 
                Strong passwords contain at least one uppercase letter, one number, and one special character.
            </div>
        </div>
    </div>
</div>

<style>
    .icon-box {
        width: 80px;
        height: 80px;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .bg-warning-subtle { background-color: #fff9e6; }

    .form-control:focus {
        box-shadow: none;
        border-color: #0d6efd;
    }

    .input-group-text {
        background-color: #f8f9fa;
        color: #6c757d;
    }
</style>

<script>
    // Funkcija za prikaz/skrivanje lozinke
    function togglePwd(id) {
        const input = document.getElementById(id);
        const icon = document.getElementById('eye-' + id);
        if (input.type === "password") {
            input.type = "text";
            icon.classList.replace('fa-eye', 'fa-eye-slash');
        } else {
            input.type = "password";
            icon.classList.replace('fa-eye-slash', 'fa-eye');
        }
    }

    // Client-side provera podudaranja lozinki
    const form = document.getElementById('passwordForm');
    const newPwd = document.getElementById('new_password');
    const confirmPwd = document.getElementById('confirm_password');
    const helpText = document.getElementById('passwordHelp');

    form.addEventListener('submit', function(e) {
        if (newPwd.value !== confirmPwd.value) {
            e.preventDefault();
            helpText.classList.remove('d-none');
            confirmPwd.classList.add('is-invalid');
        }
    });

    // Ukloni upozorenje čim korisnik počne da kuca
    confirmPwd.addEventListener('input', function() {
        helpText.classList.add('d-none');
        confirmPwd.classList.remove('is-invalid');
    });
</script>
{% endblock %}
