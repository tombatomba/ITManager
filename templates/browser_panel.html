{% extends "base.html" %}

{% block title %}AI Browser{% endblock %}

{% block content %}
<div id="browser-panel" style="height:100%; display:flex; flex-direction:column;">
    <div class="">
        <strong>Do not use for browsing. Links are broken! If you know exact url load page and try to generate context for AI. It is optimized for simple txt pages</strong>
      </div>
    
    <div style="padding:8px; border-bottom:1px solid #ccc; display:flex; gap:8px;">
        <input
            id="urlInput"
            type="text"
            placeholder="https://example.com"
            style="flex:1; padding:6px;"
            onkeydown="if(event.key==='Enter') loadUrl()"
        >
        <button class="btn btn-primary" onclick="loadUrl()"><i class="bi bi-play"></i></button>
        <button class="btn btn-info" onclick="requestAIContext()">Send to AI</button>
    </div>
<div style="height:100vh">
    <iframe
        id="browserFrame"
        style="flex:1; height:80%;width:100%; border:none;"
        sandbox="allow-scripts allow-same-origin allow-forms allow-popups"
    ></iframe>
</div>
</div>

<script>



window.AI_CONTEXT="";


function loadUrl() {
    let url = document.getElementById("urlInput").value.trim();
    if (!url) return;

    if (!url.startsWith("http")) {
        url = "https://" + url;
    }

    document.getElementById("browserFrame").src =
        "/browser?url=" + encodeURIComponent(url);

}

function requestAIContext() {
    const iframe = document.getElementById("browserFrame");
    alert('dasda');
    iframe.contentWindow.postMessage({ type: "GET_CONTEXT" }, "*");
}

window.addEventListener("message", (e) => {
    if (e.data.type === "AI_CONTEXT") {
        console.log("AI context:", e.data);
        window.AI_CONTEXT=e.data.text;



        // TODO: prosledi kontekst AI endpointu
        // fetch("/ai/openai", { ... })
    }
});




</script>
{% endblock %}
