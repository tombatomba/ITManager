{% extends "base.html" %}
{% block content %}

<h2>Edit User</h2>

<!-- Flash messages -->
{% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}
    {% for category, message in messages %}
      <div class="flash-message {{ category }}">
        {{ message }}
      </div>
    {% endfor %}
  {% endif %}
{% endwith %}

<!-- Edit User Form (gore) -->
<form action="{{ url_for('web.edit_user', user_id=user.ID) }}" method="POST">
    <div class="mb-3">
        <input type="text" name="Name" class="form-control"  placeholder="Name" value="{{ user.Name }}" required>
    </div>
    <div class="mb-3">
        <input type="email" name="Email" class="form-control"  placeholder="Email" value="{{ user.Email }}" required>
    </div>
    <div class="mb-3">
    <select name="Role" class="form-control" required>
        <option value="">Select Role</option>
        <option value="Admin" {% if user.Role=='Admin' %}selected{% endif %}>Admin</option>
        <option value="User" {% if user.Role=='User' %}selected{% endif %}>User</option>
        <option value="Viewer" {% if user.Role=='Viewer' %}selected{% endif %}>Viewer</option>
    </select>
    </div>
    <button type="submit" class="btn btn-primary">Save Changes</button>
    <a href="{{ url_for('web.users_web') }}" class="btn btn-secondary">Cancel</a>
    </div>
</form>

{% endblock %}
