{% extends "base.html" %}

{% block title %}Categories{% endblock %}

{% block content %}


<!-- Bootstrap 5 -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.23.1/ace.js"></script>


<div class="row justify-content-center">
<div class="col-lg-8">

<div class="card shadow-sm">
<div class="card-body">
<h4 class="mb-3">AI /ask tester</h4>


<div class="mb-3">
<label class="form-label">Prompt</label>
<textarea id="prompt100" class="form-control" rows="5" value="i have problem with phone"
    placeholder="Ask something like: How should I evaluate a senior developer?"></textarea>
</div>


<div class="accordion" id="accordionExample">
    <div class="accordion-item">
      <h2 class="accordion-header">
        <button class="accordion-button" type="button" data-bs-toggle="collapse" data-bs-target="#collapseOne" aria-expanded="true" aria-controls="collapseOne">
          Structural output function
        </button>
      </h2>
      <div id="collapseOne" class="accordion-collapse collapse hide" data-bs-parent="#accordionExample">
        <div class="accordion-body">
            <div class="mb-3">
                <label for="editor" class="form-label">Structural output</label>
                <div id="editor" style="height: 250px;  border: 1px solid #ccc;"></div>    
            </div>
            <div class="mb-3">
                <label for="htmlEditor" class="form-label">Html editor</label>
                <div id="htmlEditor" style="height: 250px;  border: 1px solid #ccc;"></div>    
            </div>

        </div>
      </div>
    </div>



<button id="askBtn100" class="mt-2 btn btn-primary">
Ask AI
</button>


<hr>


<div>
<label class="form-label">Response</label>
<pre id="response100" class="bg-dark text-light p-3 rounded" style="min-height: 150px;"></pre>
</div>
</div>
</div>


</div>
</div>
</div>

<script>
    const editor = ace.edit("editor", {
        mode: "ace/mode/json",
        theme: "ace/theme/textmate",
        value: `[
  {
    "name": "exec_func",
    "description": "Process a customer support ticket request",
    "parameters": {
      "type": "object",
      "properties": {
        "ticketType": {
          "type": "string",
          "enum": ["HW", "SW", "MOBILE", "NETWORK", "OTHER"]
        },
        "reason": {
          "type": "string",
          "enum": ["Error", "Information", "OTHER"]
        },
        "system": {
          "type": "string",
          "enum": ["SAP", "WINDOWS", "OTHER"]
        }
      },
      "required": ["ticketType", "reason", "system"]
    }
  }
]`
    });
    
    const htmlEditor = ace.edit("htmlEditor", {
        mode: "ace/mode/html",
        theme: "ace/theme/textmate",
        value: `<div class="card">
  <div class="card-header">
    <strong>Support ticket</strong>
  </div>
  <div class="card-body">
    <p>
      <strong>Ticket type:</strong>
      {{ ticketType | default("N/A") }}
    </p>
    <p>
      <strong>Reason:</strong>
      {{ reason | default("N/A") }}
    </p>
    <p>
      <strong>System:</strong>
      {{ system | default("N/A") }}
    </p>
  </div>
</div>`
    });
    
    const getJsonFromEditor = () => editor.getValue();
    const getHtmlFromEditor = () => htmlEditor.getValue();
    
    document.getElementById("askBtn100").addEventListener("click", async () => {
        const prompt = document.getElementById("prompt100").value;
        const structuralOutput = getJsonFromEditor();
        const htmlTemplate = getHtmlFromEditor();
    
        const responseBox100 = document.getElementById("response100");
        const renderedHtmlDiv = document.getElementById("renderedHtml");
    
        responseBox100.textContent = "Thinking...";
    
        const payload = { prompt };
    
        if (structuralOutput && structuralOutput.trim()) {
            payload.func = {
                name: "exec_func",
                text: structuralOutput
            };
        }
    
        try {
            /* 1️⃣ POZIV AI /ask */
            const res = await fetch("/ai/ask", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });
    
            const data = await res.json();
            responseBox100.textContent = JSON.stringify(data.answer, null, 2);
    
            /* 2️⃣ AKO IMA HTML TEMPLATE → RENDERUJ */
            if (htmlTemplate && data.answer) {
                const rendered = await renderTemplate(data.answer, htmlTemplate);
                renderedHtmlDiv.innerHTML = rendered;
            }
    
        } catch (err) {
            if (htmlTemplate) 
                renderedHtmlDiv.innerHTML = '<h3>EtttRROR</h3>';
            else
                responseBox100.textContent = "Error: " + err.message;
        }
    });
    
    /* 3️⃣ RENDER TEMPLATE ENDPOINT */
    async function renderTemplate(jsonData, htmlTemplate) {
        const res = await fetch("/ai/render-template", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                data: jsonData,
                template: htmlTemplate
            })
        });
    
        if (!res.ok) {
            throw new Error("Render failed");
        }
    
        const result = await res.text();
        return result;
    }
    </script>

<div class="card mt-3">
    <div class="card-header">Rendered output</div>
    <div class="card-body" id="renderedHtml"></div>
  </div>

</div>

{% endblock %}
